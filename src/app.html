<!doctype html>
<html lang="es-VE" %sveltekit.theme%>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="icon" href="%sveltekit.assets%/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <meta name="theme-color" content="#0B4F6C" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes"
    />
    <meta
      name="description"
      content="Faro VE — Mapa humanitario para reportar y buscar personas desaparecidas tras el terremoto del 24-jun-2026 en Venezuela. PWA gratuita, sin fines de lucro, privacidad por diseño."
    />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Faro VE" />
    <meta property="og:title" content="Faro VE — Mapa de Esperanza Venezuela" />
    <meta
      property="og:description"
      content="Reporta y busca personas desaparecidas tras el terremoto del 24-jun-2026 en Venezuela. Mapa instalable, gratuito, anti-estafa."
    />
    <meta property="og:locale" content="es_VE" />
    <meta property="og:image" content="%sveltekit.assets%/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Faro VE — Mapa de Esperanza Venezuela" />
    <meta
      name="twitter:description"
      content="Reporta y busca personas desaparecidas tras el terremoto del 24-jun-2026 en Venezuela."
    />
    <meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />

    <!-- Anti-tracking -->
    <meta name="referrer" content="no-referrer" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="min-h-screen bg-white text-gray-900 antialiased">
    <div style="display: contents">%sveltekit.body%</div>
    <noscript>
      <p style="padding:1rem;background:#fef3c7;color:#78350f">
        Faro VE necesita JavaScript para mostrar el mapa. Por favor habilítalo.
      </p>
    </noscript>
  </body>
</html>
