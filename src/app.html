<!doctype html>
<html lang="es-VE" %sveltekit.theme%>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/faro-icon.svg?v=3" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png?v=3" sizes="48x48" type="image/png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <meta name="theme-color" content="#0B4F6C" />
    <!-- interactive-widget=resizes-content: al abrir el teclado, el layout se
         REDIMENSIONA (no se desplaza) → la barra inferior fija no queda detrás del
         teclado ni se "pierde". Se mantiene el zoom de página (accesibilidad). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta
      name="description"
      content="Faro VE — Mapa humanitario para reportar y buscar personas desaparecidas tras el terremoto del 24-jun-2026 en Venezuela. PWA gratuita, sin fines de lucro, privacidad por diseño."
    />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph (invariante del sitio). El título/descripción los pone CADA
         página en su <svelte:head> → exactamente uno por página, sin duplicados
         (WhatsApp/FB usan el PRIMER og:title, así que un default aquí ganaría a un
         override por-página). Las páginas sin og:title caen al <title>. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Faro VE" />
    <meta property="og:locale" content="es_VE" />
    <!-- URL ABSOLUTA: WhatsApp/FB no resuelven og:image relativa de forma fiable. -->
    <meta property="og:image" content="https://faro-ve.com/og-image.png?v=1" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Faro VE — Mapa de Esperanza Venezuela" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://faro-ve.com/og-image.png?v=1" />

    <!-- Anti-tracking -->
    <meta name="referrer" content="no-referrer" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="min-h-screen bg-white text-gray-900 antialiased">
    <div style="display: contents">%sveltekit.body%</div>
    <noscript>
      <p style="padding:1rem;background:#fef3c7;color:#78350f">
        Faro VE necesita JavaScript para mostrar el mapa. Por favor habilítalo.
      </p>
    </noscript>
  </body>
</html>
